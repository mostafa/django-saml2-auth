# Tag pushes always run the full test matrix and publish (paths-ignore would skip releases on doc-only tags).
name: Release

on:
  push:
    tags:
      - v*

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  test-suite:
    permissions:
      contents: read # nested reusable: checkout + Coveralls
      id-token: write # nested reusable: matrix OIDC scope
    uses: ./.github/workflows/reusable-test.yml
  build:
    name: Build and publish django-saml2-auth-community to PyPI
    runs-on: ubuntu-latest
    needs: test-suite
    # Use a dedicated environment so PyPI tokens are not read at job level without it (zizmor: secrets-outside-env).
    environment:
      name: pypi
    env:
      python-version: "3.10"
    permissions:
      contents: write # create releases and attach wheels/sdist/SBOM
      id-token: write # OIDC for PyPI trusted publishing when configured
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python 🐍
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
      - name: Install system libraries 📦
        run: |
          sudo apt-get update
          sudo apt-get install -y xmlsec1 libxml2-dev libxslt1-dev
      - name: Install dependencies 📦
        run: |
          uv sync
          uv pip install build cyclonedx-bom twine
      - name: Generate CycloneDX SBOM artifacts 📃
        run: |
          uv run python -m cyclonedx_py env --pyproject pyproject.toml --of JSON -o django-saml2-auth-community-${GITHUB_REF_NAME}.cyclonedx.json
      - name: Build package 🏗️
        run: |
          uv run python -m build
      - name: Verify package metadata (README / long description) 📄
        run: |
          uv run python -m twine check --strict dist/*
      - name: Publish to PyPI 📦
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv run python -m twine upload --username __token__ --password "$PYPI_API_TOKEN" dist/*
      - name: Create release and add artifacts 🚀
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*.tar.gz \
            dist/*.whl \
            "django-saml2-auth-community-${GITHUB_REF_NAME}.cyclonedx.json"
