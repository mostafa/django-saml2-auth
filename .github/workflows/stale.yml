name: "Close stale issues and PRs"
on:
  schedule:
    - cron: "30 1 * * *"

concurrency:
  group: stale
  cancel-in-progress: false

permissions: {}
jobs:
  stale:
    name: Mark and close stale issues/PRs
    runs-on: ubuntu-latest
    permissions:
      actions: write # stale workflow introspection
      contents: read # read repo metadata for stale checks
      issues: write # label, comment, and close issues
      pull-requests: write # label, comment, and close PRs
    steps:
      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10.2.0
        with:
          stale-issue-message: "This issue is stale because it has been open 30 days with no activity. Remove stale label or comment or this will be closed in 5 days."
          stale-pr-message: "This PR is stale because it has been open 45 days with no activity. Remove stale label or comment or this will be closed in 10 days."
          close-issue-message: "This issue was closed because it has been stalled for 5 days with no activity."
          close-pr-message: "This PR was closed because it has been stalled for 10 days with no activity."
          days-before-issue-stale: 30
          days-before-pr-stale: 45
          days-before-issue-close: 5
          days-before-pr-close: 10
          stale-issue-label: "no-issue-activity"
          exempt-issue-labels: "awaiting-approval,work-in-progress"
          stale-pr-label: "no-pr-activity"
          exempt-pr-labels: "awaiting-approval,work-in-progress"
